<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大台北水脈：五大水系數位導覽</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080e1a;--surface:#0f1929;--surface2:#172135;--surface3:#1e2d44;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  --text:#dce8f5;--muted:#6b84a0;--accent:#38bdf8;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"Noto Sans TC",sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;overflow:hidden;}

/* ── Sidebar ── */
#sidebar{width:300px;min-width:300px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:1000;overflow:hidden;}
#sidebar-header{padding:20px 18px 14px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,#0d1e35 0%,var(--surface) 100%);}
.eyebrow{font-size:9px;letter-spacing:.22em;color:var(--accent);text-transform:uppercase;margin-bottom:5px;opacity:.8;}
#sidebar-header h1{font-family:"Noto Serif TC",serif;font-size:19px;font-weight:700;line-height:1.3;color:#fff;}
#sidebar-header p{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.5;}

/* ── River list ── */
#river-list{padding:12px 10px 10px;border-bottom:1px solid var(--border);flex-shrink:0;}
.section-label{font-size:9px;letter-spacing:.16em;color:var(--muted);text-transform:uppercase;padding:0 8px;margin-bottom:8px;opacity:.7;}
.river-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;transition:background .15s;user-select:none;}
.river-item:hover,.river-item.active{background:var(--surface2);}
.river-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;transition:transform .15s;}
.river-item:hover .river-dot{transform:scale(1.4);}
.river-name{font-size:12.5px;font-weight:500;}
.river-length{font-size:10px;color:var(--muted);}
.river-toggle{margin-left:auto;width:30px;height:16px;background:var(--surface3);border:1px solid var(--border);border-radius:8px;position:relative;transition:background .2s;flex-shrink:0;cursor:pointer;}
.river-toggle::after{content:"";position:absolute;top:2px;left:2px;width:10px;height:10px;border-radius:50%;background:var(--muted);transition:transform .2s,background .2s;}
.river-item.visible .river-toggle{background:rgba(56,189,248,.15);border-color:var(--accent);}
.river-item.visible .river-toggle::after{transform:translateX(14px);background:var(--accent);}
.river-badge{font-size:11px;margin-left:4px;}

/* ── Tabs ── */
.tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.tab-btn{flex:1;padding:9px 0;font-size:11.5px;background:transparent;border:none;color:var(--muted);cursor:pointer;font-family:inherit;transition:color .15s;border-bottom:2px solid transparent;margin-bottom:-1px;}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-btn:hover:not(.active){color:var(--text);}

/* ── Panels ── */
#panel-info,#panel-water{flex:1;overflow-y:auto;padding:14px 14px;}
#panel-info::-webkit-scrollbar,#panel-water::-webkit-scrollbar{width:3px;}
#panel-info::-webkit-scrollbar-thumb,#panel-water::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
.panels-wrap{flex:1;overflow:hidden;display:flex;flex-direction:column;}
#panel-water{display:none;}
.info-placeholder{color:var(--muted);font-size:12px;line-height:1.7;text-align:center;padding:28px 8px;}
.info-placeholder .icon{font-size:26px;margin-bottom:8px;opacity:.35;}
#river-detail{display:none;}

/* ── Detail styles ── */
.detail-chip{display:inline-block;font-size:9px;letter-spacing:.1em;text-transform:uppercase;padding:2px 9px;border-radius:20px;margin-bottom:9px;}
.detail-name{font-family:"Noto Serif TC",serif;font-size:20px;font-weight:700;margin-bottom:5px;}
.detail-subtitle{font-size:11px;color:var(--muted);margin-bottom:14px;line-height:1.5;}
.detail-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px;}
.stat-box{background:var(--surface2);border:1px solid var(--border);border-radius:7px;padding:9px 11px;}
.stat-box .s-label{font-size:9px;color:var(--muted);margin-bottom:2px;letter-spacing:.05em;}
.stat-box .s-val{font-size:14px;font-weight:500;}
.detail-desc{font-size:11.5px;color:#8aaac4;line-height:1.85;margin-bottom:14px;}
.poi-list-title{font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:7px;}
.poi-tag{display:inline-block;font-size:10.5px;padding:3px 9px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);margin:0 4px 5px 0;cursor:pointer;transition:border-color .15s,color .15s;}
.poi-tag:hover{border-color:var(--accent);color:var(--accent);}
.flyto-btn,.back-btn{display:flex;align-items:center;gap:7px;width:100%;padding:9px 13px;background:transparent;border:1px solid var(--border2);border-radius:7px;color:var(--text);font-size:11.5px;cursor:pointer;transition:border-color .15s,background .15s;margin-top:10px;font-family:inherit;}
.flyto-btn:hover{border-color:var(--accent);background:rgba(56,189,248,.05);}
.back-btn{margin-top:0;margin-bottom:4px;color:var(--muted);}
.back-btn:hover{color:var(--accent);border-color:var(--accent);}

/* ── Status badges ── */
.status-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;font-weight:500;}
.badge-alert{background:rgba(244,67,54,.15);color:#f44336;border:1px solid rgba(244,67,54,.3);}
.badge-warn{background:rgba(255,152,0,.15);color:#ff9800;border:1px solid rgba(255,152,0,.3);}
.badge-ok{background:rgba(76,175,80,.15);color:#4caf50;border:1px solid rgba(76,175,80,.3);}

/* ── Water panel ── */
.water-update{font-size:10px;color:var(--muted);margin-bottom:10px;text-align:right;}
.water-river-section{margin-bottom:14px;}
.water-river-title{font-size:11px;font-weight:600;letter-spacing:.08em;margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid var(--border);}
.station-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 11px;margin-bottom:6px;cursor:pointer;transition:border-color .15s;}
.station-card:hover{border-color:var(--border2);}
.station-card-alert{border-color:rgba(244,67,54,.4);background:rgba(244,67,54,.05);}
.station-card-warn{border-color:rgba(255,152,0,.35);background:rgba(255,152,0,.04);}
.station-name{font-size:12px;font-weight:500;}
.station-level{font-size:14px;font-weight:600;}
.level-bar-bg{height:6px;background:var(--surface3);border-radius:3px;overflow:visible;position:relative;}
.level-bar-fill{height:100%;border-radius:3px;transition:width .4s;}
.level-bar-warn{position:absolute;top:-3px;bottom:-3px;width:1px;background:rgba(255,152,0,.6);}

/* ── Stats bar ── */
#stats-bar{padding:10px 14px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-size:10px;color:var(--muted);flex-wrap:wrap;gap:3px;flex-shrink:0;background:var(--surface);}
#stats-bar span b{color:var(--text);font-weight:500;}

/* ── Map ── */
#map{flex:1;position:relative;}
.leaflet-container{background:#06101e!important;}
.river-tooltip{background:#0f1929!important;border:1px solid rgba(255,255,255,.1)!important;color:#dce8f5!important;font-family:"Noto Sans TC",sans-serif!important;font-size:11.5px!important;padding:5px 10px!important;border-radius:6px!important;box-shadow:0 4px 20px rgba(0,0,0,.6)!important;}
.leaflet-tooltip-top::before{border-top-color:rgba(255,255,255,.1)!important;}

/* ── POI marker ── */
.poi-marker{width:30px;height:30px;background:var(--surface);border:2px solid;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 2px 8px rgba(0,0,0,.5);}
.poi-marker:hover{transform:scale(1.2);box-shadow:0 4px 16px rgba(0,0,0,.7);}

/* ── Station marker ── */
.station-marker{width:40px;height:40px;background:var(--surface);border:2px solid;border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 2px 10px rgba(0,0,0,.6);transition:transform .15s;}
.station-marker:hover{transform:scale(1.1);}
.station-pulse{animation:pulse 1.8s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(244,67,54,.4)}50%{box-shadow:0 0 0 6px rgba(244,67,54,0)}}

/* ── Loading ── */
#loading{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .6s;}
#loading .load-title{font-family:"Noto Serif TC",serif;font-size:22px;color:#fff;margin-bottom:6px;letter-spacing:.05em;}
#loading p{font-size:12px;color:var(--muted);margin-bottom:22px;}
.loader-bar{width:180px;height:1.5px;background:rgba(255,255,255,.08);border-radius:1px;overflow:hidden;}
.loader-fill{height:100%;background:linear-gradient(90deg,var(--accent),#818cf8);border-radius:1px;animation:load 1.4s ease forwards;}
@keyframes load{from{width:0}to{width:100%}}

/* ── DP badge ── */
#dp-badge{position:absolute;bottom:48px;right:10px;background:rgba(15,25,41,.85);border:1px solid var(--border);border-radius:7px;padding:6px 12px;font-size:10px;color:var(--muted);z-index:800;pointer-events:none;backdrop-filter:blur(4px);}
#dp-badge b{color:var(--accent);}

/* ── RWD ── */
@media(max-width:700px){
  #sidebar{width:100%;min-width:unset;height:48vh;}
  body{flex-direction:column;}
  #map{height:52vh;}
  .detail-stats{grid-template-columns:1fr 1fr 1fr 1fr;}
}
</style>
</head>
<body>

<div id="loading">
  <div class="load-title">大台北水脈</div>
  <p>正在載入五大水系空間資料與水情資訊…</p>
  <div class="loader-bar"><div class="loader-fill"></div></div>
</div>

<div id="sidebar">
  <div id="sidebar-header">
    <div class="eyebrow">Web GIS · Taipei River System</div>
    <h1>五大水系<br>數位導覽系統</h1>
    <p>整合空間資料 · 即時水情 · 景點導覽</p>
  </div>

  <div id="river-list">
    <div class="section-label">水系篩選 · 5 條河流</div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="info">📍 流域資訊</button>
    <button class="tab-btn" data-tab="water">💧 即時水情</button>
  </div>

  <div class="panels-wrap">
    <div id="panel-info">
      <div id="info-placeholder" class="info-placeholder">
        <div class="icon">🗺</div>
        <p>點擊左側水系名稱<br>或地圖上的河流線段<br>以查看詳細流域資訊</p>
      </div>
      <div id="river-detail"></div>
    </div>
    <div id="panel-water">
      <div class="info-placeholder"><div class="icon">⏳</div><p>載入水情資料中…</p></div>
    </div>
  </div>

  <div id="stats-bar">
    <span>原始節點 <b id="total-nodes">—</b></span>
    <span>DP 後 <b id="simplified-nodes">—</b></span>
    <span>節省 <b id="reduction-pct">—</b></span>
  </div>
</div>

<div id="map">
  <div id="dp-badge">Douglas-Peucker ε = <b>0.001°</b></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
/**
 * rivers.js
 * 五大水系模擬 GeoJSON 座標資料（以真實地理位置為基礎）
 * 座標系統：WGS84 (EPSG:4326)
 *
 * Douglas-Peucker 演算法實作
 * 用途：降低節點數，減少前端渲染負擔
 */

// ─────────────────────────────────────────────
// Douglas-Peucker Algorithm
// ─────────────────────────────────────────────
function perpendicularDistance(pt, lineStart, lineEnd) {
  const dx = lineEnd[0] - lineStart[0];
  const dy = lineEnd[1] - lineStart[1];
  if (dx === 0 && dy === 0) {
    return Math.sqrt(Math.pow(pt[0] - lineStart[0], 2) + Math.pow(pt[1] - lineStart[1], 2));
  }
  const t = ((pt[0] - lineStart[0]) * dx + (pt[1] - lineStart[1]) * dy) / (dx * dx + dy * dy);
  const nearX = lineStart[0] + t * dx;
  const nearY = lineStart[1] + t * dy;
  return Math.sqrt(Math.pow(pt[0] - nearX, 2) + Math.pow(pt[1] - nearY, 2));
}

function douglasPeucker(points, epsilon) {
  if (points.length < 3) return points;
  let maxDist = 0;
  let maxIdx = 0;
  const end = points.length - 1;
  for (let i = 1; i < end; i++) {
    const d = perpendicularDistance(points[i], points[0], points[end]);
    if (d > maxDist) { maxDist = d; maxIdx = i; }
  }
  if (maxDist > epsilon) {
    const left  = douglasPeucker(points.slice(0, maxIdx + 1), epsilon);
    const right = douglasPeucker(points.slice(maxIdx), epsilon);
    return [...left.slice(0, -1), ...right];
  }
  return [points[0], points[end]];
}

// ─────────────────────────────────────────────
// 原始河流座標資料（模擬，貼近真實走向）
// ─────────────────────────────────────────────

const RIVERS_RAW = [
  {
    id: 'danshui',
    name: '淡水河',
    nameEn: 'Tamsui River',
    color: '#4fc3f7',
    length: '158 km',
    basin: '2,726 km²',
    origin: '雪山山脈',
    desc: '淡水河是大台北地區最主要的河流，全長約 158 公里，流域面積達 2,726 平方公里，為台灣第三大河流。其流域涵蓋台北盆地，歷史上是北台灣交通、貿易與文化發展的命脈，大稻埕碼頭見證了清末至日治時期的商業繁盛。',
    pois: ['關渡', '大稻埕', '淡水老街', '紅樹林'],
    bounds: [[24.92, 121.42], [25.18, 121.52]],
    coords: generateDanshui()
  },
  {
    id: 'xindian',
    name: '新店溪',
    nameEn: 'Xindian River',
    color: '#81c784',
    length: '85 km',
    basin: '916 km²',
    origin: '雪山山脈東麓',
    desc: '新店溪是淡水河最大支流，發源於雪山山脈，流經烏來、新店等地後匯入淡水河。碧潭是新店溪著名景點，吊橋橫跨翠綠溪水，為大台北郊遊勝地。上游烏來溫泉享譽全台，融合泰雅族文化。',
    pois: ['碧潭', '烏來溫泉', '青潭', '直潭壩'],
    bounds: [[24.85, 121.48], [25.02, 121.62]],
    coords: generateXindian()
  },
  {
    id: 'jingmei',
    name: '景美溪',
    nameEn: 'Jingmei River',
    color: '#aed581',
    length: '35 km',
    basin: '130 km²',
    origin: '石碇山區',
    desc: '景美溪發源於石碇山區，流經木柵、景美後匯入新店溪。沿岸貓空纜車、木柵動物園與指南宮構成台北南區重要觀光廊帶。溪畔自行車道綠意盎然，是市民休閒的重要場所。',
    pois: ['貓空纜車', '木柵動物園', '景美夜市', '指南宮'],
    bounds: [[24.95, 121.54], [25.01, 121.65]],
    coords: generateJingmei()
  },
  {
    id: 'jilong',
    name: '基隆河',
    nameEn: 'Jilong River',
    color: '#ff8a65',
    length: '96 km',
    basin: '494 km²',
    origin: '平溪山區',
    desc: '基隆河發源於平溪山區，流經瑞芳、暖暖、七堵，進入台北盆地後繞行內湖、南港、松山，最終在社子島匯入淡水河。其彎曲的河道歷史上曾造成多次嚴重洪患，日治時代起陸續進行截彎取直工程。',
    pois: ['十分瀑布', '九份', '大直', '社子島'],
    bounds: [[25.02, 121.52], [25.12, 121.72]],
    coords: generateJilong()
  },
  {
    id: 'dahan',
    name: '大漢溪',
    nameEn: 'Dahan River',
    color: '#ce93d8',
    length: '135 km',
    basin: '1,163 km²',
    origin: '品田山',
    desc: '大漢溪發源於雪山山脈品田山，流經復興、大溪、桃園、鶯歌，最終在江子翠匯入淡水河，為淡水河第二大支流。石門水庫攔蓄其水量，是桃園、台北地區重要水源。大溪老街保留豐富閩南建築風貌。',
    pois: ['石門水庫', '大溪老街', '鶯歌陶瓷', '三峽老街'],
    bounds: [[24.78, 121.18], [24.98, 121.48]],
    coords: generateDahan()
  }
];

// ─────────────────────────────────────────────
// 各河流座標生成（模擬真實走向，密度較高以展示 DP 效果）
// ─────────────────────────────────────────────

function generateDanshui() {
  // 從淡水出海口 → 江子翠匯流點，偏西北走向
  const spine = [
    [25.181, 121.440], [25.175, 121.445], [25.168, 121.449],
    [25.160, 121.454], [25.152, 121.459], [25.145, 121.463],
    [25.138, 121.461], [25.130, 121.458], [25.122, 121.460],
    [25.115, 121.463], [25.108, 121.465], [25.102, 121.468],
    [25.095, 121.465], [25.088, 121.462], [25.080, 121.460],
    [25.072, 121.462], [25.065, 121.465], [25.058, 121.468],
    [25.050, 121.468], [25.042, 121.468], [25.035, 121.467],
    [25.028, 121.466], [25.020, 121.465]
  ];
  return densify(spine, 12);
}

function generateXindian() {
  // 烏來 → 新店 → 江子翠方向
  const spine = [
    [24.858, 121.622], [24.868, 121.610], [24.878, 121.598],
    [24.888, 121.590], [24.896, 121.580], [24.902, 121.572],
    [24.908, 121.562], [24.912, 121.552], [24.916, 121.542],
    [24.920, 121.535], [24.924, 121.528], [24.928, 121.520],
    [24.932, 121.514], [24.936, 121.508], [24.940, 121.502],
    [24.944, 121.498], [24.948, 121.493], [24.952, 121.490],
    [24.956, 121.486], [24.960, 121.483], [24.964, 121.480],
    [24.968, 121.477], [24.972, 121.474], [24.976, 121.472],
    [24.980, 121.470], [24.984, 121.468], [24.988, 121.466],
    [24.992, 121.465], [24.996, 121.464], [25.000, 121.463],
    [25.004, 121.462], [25.008, 121.461], [25.012, 121.460],
    [25.016, 121.459], [25.020, 121.465]
  ];
  return densify(spine, 10);
}

function generateJingmei() {
  // 石碇 → 景美 → 新店溪匯流
  const spine = [
    [24.960, 121.648], [24.964, 121.638], [24.968, 121.628],
    [24.970, 121.618], [24.972, 121.608], [24.973, 121.598],
    [24.974, 121.590], [24.975, 121.582], [24.975, 121.574],
    [24.976, 121.566], [24.976, 121.558], [24.977, 121.552],
    [24.978, 121.546], [24.978, 121.540], [24.979, 121.534],
    [24.980, 121.528], [24.981, 121.522], [24.982, 121.516],
    [24.983, 121.510], [24.984, 121.504], [24.984, 121.498],
    [24.985, 121.492], [24.986, 121.486], [24.988, 121.482],
    [24.990, 121.478], [24.992, 121.475], [24.994, 121.472],
    [24.996, 121.469], [24.998, 121.466], [25.000, 121.463]
  ];
  return densify(spine, 8);
}

function generateJilong() {
  // 平溪 → 瑞芳 → 七堵 → 內湖 → 松山 → 社子
  const spine = [
    [25.022, 121.722], [25.028, 121.712], [25.034, 121.700],
    [25.040, 121.690], [25.045, 121.678], [25.050, 121.668],
    [25.054, 121.658], [25.057, 121.648], [25.060, 121.638],
    [25.062, 121.628], [25.064, 121.618], [25.065, 121.608],

function generateDahan() {
  // 品田山 → 復興 → 大溪 → 桃園鶯歌 → 江子翠
  const spine = [

  return densify(spine, 8);

// ── 在關鍵點之間插入隨機細節點（模擬 Shapefile 密度）
function densify(spine, factor) {
  const out = [];
  for (let i = 0; i < spine.length - 1; i++) {
    out.push(spine[i]);
    const [x0, y0] = spine[i];
    const [x1, y1] = spine[i + 1];
    for (let j = 1; j < factor; j++) {
      const t = j / factor;
      const noise = (Math.random() - 0.5) * 0.003;
      out.push([
        x0 + (x1 - x0) * t + noise,
        y0 + (y1 - y0) * t + noise
      ]);
    }
  }
  out.push(spine[spine.length - 1]);
  return out;
}

// ─────────────────────────────────────────────
// 套用 Douglas-Peucker，建立 GeoJSON
// ─────────────────────────────────────────────
const DP_EPSILON = 0.001; // 約 100 公尺精度

const RIVERS = RIVERS_RAW.map(r => {
  const simplified = douglasPeucker(r.coords, DP_EPSILON);

    simplifiedCount: simplified.length,
    geojson: {
      type: 'Feature',
      properties: { id: r.id, name: r.name },
      geometry: {
        type: 'LineString',
        // GeoJSON 座標為 [lng, lat]
        coordinates: simplified.map(([lat, lng]) => [lng, lat])
      }
    }
  };
});

// ── 模擬 API 回應（真實格式）
function simulateReading(station) {
  // 模擬正常水位 + 偶發性警戒
  const base = station.warn * 0.6;
  const rand = Math.random();
  let level;
  if (rand < 0.1)      level = station.alert + Math.random() * 0.8;  // 超警戒
  else if (rand < 0.25) level = station.warn  + Math.random() * (station.alert - station.warn) * 0.8;
  else                  level = base + Math.random() * (station.warn - base) * 0.9;

  // 雨量模擬
  const rain = rand < 0.15 ? 20 + Math.random() * 60 : Math.random() * 15;

  // 歷史趨勢（過去12小時，每小時一筆）
  const trend = [];
  let prev = level * (0.85 + Math.random() * 0.1);
  for (let i = 11; i >= 0; i--) {
    prev += (Math.random() - 0.48) * 0.15;
    prev = Math.max(0.3, prev);
    trend.push({ hour: i, val: +prev.toFixed(2) });
  }
  trend.push({ hour: 0, val: +level.toFixed(2) });

  return {
    stationId:  station.id,
    level:      +level.toFixed(2),
    rain:       +rain.toFixed(1),
    updatedAt:  new Date().toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit' }),
    status:     level >= station.alert ? 'alert'
              : level >= station.warn  ? 'warn'
              : 'normal',
    trend
  };
}

// ── 模擬 fetch（可替換為真實 API）
window.fetchWaterData = function() {
  return new Promise(resolve => {
    setTimeout(() => {
      const readings = {};
      STATIONS.forEach(s => { readings[s.id] = simulateReading(s); });
      resolve(readings);
    }, 600);
  });
};

}
function onRiverLeave(e, river, lyr) {
  if (lyr._hoverTip) { map.removeLayer(lyr._hoverTip); lyr._hoverTip = null; }
  if (State.selectedRiver !== river.id) lyr.setStyle({ weight:2.5, opacity:0.85 });
}

function selectRiver(id) {
  const river = RIVERS.find(r => r.id === id);
  if (!river) return;

  // Reset previous
  if (State.selectedRiver && State.selectedRiver !== id) {
    const prev = RIVERS.find(r => r.id === State.selectedRiver);
    if (prev) State.layers[prev.id]?.setStyle({ weight:2.5, opacity:0.85 });
    State.riverItems[State.selectedRiver]?.classList.remove('active');
  }
  State.selectedRiver = id;
  State.layers[id]?.setStyle({ weight:5, opacity:1 });
  State.layers[id]?.bringToFront();
  Object.values(State.riverItems).forEach(el => el.classList.remove('active'));
  State.riverItems[id]?.classList.add('active');

  switchToInfoTab();
  showRiverDetail(river);
}

// ═══════════════════════════════════════════
// UI Module — Info panel contents
// ═══════════════════════════════════════════
function switchToInfoTab() {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === 'info'));
  document.getElementById('panel-info').style.display  = 'block';
  document.getElementById('panel-water').style.display = 'none';
  State.activeTab = 'info';
}
function switchToWaterTab() {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === 'water'));
  document.getElementById('panel-info').style.display  = 'none';
  document.getElementById('panel-water').style.display = 'block';
  State.activeTab = 'water';
}

function showRiverDetail(river) {
  document.getElementById('info-placeholder').style.display = 'none';
  const detail = document.getElementById('river-detail');
  detail.style.display = 'block';

  // POIs for this river
  const myPois = POI_DATA.filter(p => p.river === river.id);
  // Station counts
  const myStations = STATIONS.filter(s => s.river === river.id);
  const alertCount = myStations.filter(s => State.waterData[s.id]?.status === 'alert').length;
  const warnCount  = myStations.filter(s => State.waterData[s.id]?.status === 'warn').length;

  let statusBadge = '';
  if (alertCount > 0)     statusBadge = `<span class="status-badge badge-alert">⚠ 超警戒 ${alertCount} 站</span>`;
  else if (warnCount > 0) statusBadge = `<span class="status-badge badge-warn">！ 注意 ${warnCount} 站</span>`;
  else if (myStations.length > 0) statusBadge = `<span class="status-badge badge-ok">✓ 正常</span>`;

  detail.innerHTML = `
    <div class="detail-chip" style="background:${river.color}22;color:${river.color};border:1px solid ${river.color}44">${river.nameEn}</div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
      <div class="detail-name" style="color:${river.color};margin:0">${river.name}</div>
      ${statusBadge}
    </div>
    <div class="detail-subtitle">${river.origin} 發源</div>
    <div class="detail-stats">
      <div class="stat-box"><div class="s-label">全長</div><div class="s-val">${river.length}</div></div>
      <div class="stat-box"><div class="s-label">流域面積</div><div class="s-val">${river.basin}</div></div>
      <div class="stat-box"><div class="s-label">原始節點</div><div class="s-val">${river.originalCount}</div></div>
      <div class="stat-box"><div class="s-label">DP 簡化後</div><div class="s-val" style="color:${river.color}">${river.simplifiedCount}</div></div>
    </div>
    <div class="detail-desc">${river.desc}</div>
    <div class="poi-list-title">沿岸景點（${myPois.length} 處）</div>
    <div style="margin-bottom:12px">
      ${myPois.map(p => `<span class="poi-tag" onclick="showPoiDetail(POI_DATA.find(x=>x.id==='${p.id}'), '${river.color}')">${p.img} ${p.name}</span>`).join('')}
    </div>
    <button class="flyto-btn" onclick="flyToRiver('${river.id}')">↗ 飛至流域範圍</button>
  `;
}

function showPoiDetail(poi, color) {
  document.getElementById('info-placeholder').style.display = 'none';
  const detail = document.getElementById('river-detail');
  detail.style.display = 'block';

  const river = RIVERS.find(r => r.id === poi.river);

  detail.innerHTML = `
    <button class="back-btn" onclick="selectRiver('${poi.river}')">← 返回 ${river?.name}</button>
    <div style="font-size:36px;margin:12px 0 8px">${poi.img}</div>
    <div class="detail-name" style="color:${color};font-size:18px">${poi.name}</div>
    <div style="margin-bottom:10px">
      ${poi.tags.map(t => `<span class="poi-tag" style="border-color:${color}44;color:${color}">${t}</span>`).join('')}
    </div>
    <div class="detail-desc">${poi.desc}</div>
    <button class="flyto-btn" onclick="map.flyTo([${poi.lat},${poi.lng}],15,{duration:1.2})">↗ 在地圖上定位</button>
  `;
}
window.showPoiDetail = showPoiDetail;

// ═══════════════════════════════════════════
// UI Module — Water panel
// ═══════════════════════════════════════════
function renderWaterPanel() {
  const panel = document.getElementById('panel-water');
  if (!Object.keys(State.waterData).length) {
    panel.innerHTML = '<div class="info-placeholder"><div class="icon">⏳</div><p>載入水情資料中…</p></div>';
    return;
  }

  // Group by river
  const byRiver = {};
  STATIONS.forEach(st => {
    if (!byRiver[st.river]) byRiver[st.river] = [];
    byRiver[st.river].push({ st, reading: State.waterData[st.id] });
  });

  let html = `<div class="water-update">資料更新時間 ${new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})}</div>`;

  RIVERS.forEach(river => {
    const entries = byRiver[river.id] || [];
    if (!entries.length) return;
    html += `<div class="water-river-section">
      <div class="water-river-title" style="color:${river.color}">${river.name}</div>
      ${entries.map(({st,reading}) => {
        if (!reading) return '';
        const pct = Math.min(100, Math.round((reading.level / st.alert) * 100));
        const barColor = reading.status === 'alert' ? '#f44336'
                       : reading.status === 'warn'  ? '#ff9800' : '#4caf50';
        const warnPct  = Math.round((st.warn  / st.alert) * 100);
        return `
          <div class="station-card ${reading.status !== 'normal' ? 'station-card-'+reading.status : ''}"
               onclick="showStationDetail(STATIONS.find(s=>s.id==='${st.id}'), State.waterData['${st.id}'])">
            <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">
              <span class="station-name">${st.name}</span>
              <span class="station-level" style="color:${barColor}">${reading.level} m</span>
            </div>
            <div class="level-bar-bg">
              <div class="level-bar-warn" style="left:${warnPct}%"></div>
              <div class="level-bar-fill" style="width:${pct}%;background:${barColor}"></div>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:3px">
              <span>0 m</span>
              <span>警戒 ${st.warn}m</span>
              <span>超警 ${st.alert}m</span>
            </div>
            <div style="font-size:10px;color:var(--muted);margin-top:4px">
              雨量 ${reading.rain} mm/hr
            </div>
          </div>`;
      }).join('')}
    </div>`;
  });

  panel.innerHTML = html;
}

function showStationDetail(st, reading) {
  if (!st || !reading) return;
  switchToWaterTab();
  const river = RIVERS.find(r => r.id === st.river);
  const barColor = reading.status === 'alert' ? '#f44336'
                 : reading.status === 'warn'  ? '#ff9800' : '#4caf50';
  const pct = Math.min(100, Math.round((reading.level / st.alert) * 100));
  const warnPct = Math.round((st.warn / st.alert) * 100);

  // Build sparkline SVG from trend data
  const vals = reading.trend.map(t => t.val);
  const minV = Math.min(...vals), maxV = Math.max(...vals);
  const range = maxV - minV || 0.1;
  const W = 230, H = 48;
  const pts = vals.map((v,i) => {
    const x = Math.round((i / (vals.length-1)) * W);
    const y = Math.round(H - ((v - minV) / range) * (H-6) - 3);
    return `${x},${y}`;
  }).join(' ');

  const warnY = Math.round(H - ((st.warn - minV) / range) * (H-6) - 3);

  const panel = document.getElementById('panel-water');
  panel.innerHTML = `
    <button class="back-btn" onclick="renderWaterPanel()">← 返回所有測站</button>
    <div style="margin-top:12px">
      <div class="detail-chip" style="background:${river?.color}22;color:${river?.color};border:1px solid ${river?.color}44">${river?.name}</div>
      <div class="detail-name" style="font-size:18px;color:${barColor}">${st.name}</div>
      <div class="detail-subtitle">測站編號 ${st.id}  ·  更新 ${reading.updatedAt}</div>
      <div class="detail-stats">
        <div class="stat-box">
          <div class="s-label">現在水位</div>
          <div class="s-val" style="color:${barColor}">${reading.level} m</div>
        </div>
        <div class="stat-box">
          <div class="s-label">小時雨量</div>
          <div class="s-val">${reading.rain} mm</div>
        </div>
        <div class="stat-box">
          <div class="s-label">警戒水位</div>
          <div class="s-val">${st.warn} m</div>
        </div>
        <div class="stat-box">
          <div class="s-label">超警水位</div>
          <div class="s-val">${st.alert} m</div>
        </div>
      </div>
      <div class="level-bar-bg" style="height:12px;margin-bottom:6px">
        <div class="level-bar-warn" style="left:${warnPct}%"></div>
        <div class="level-bar-fill" style="width:${pct}%;background:${barColor}"></div>
      </div>
      <div class="poi-list-title" style="margin-top:14px">過去 12 小時水位趨勢</div>
      <div style="background:var(--surface2);border-radius:8px;padding:10px 12px;margin-top:6px">
        <svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" style="overflow:visible">
          ${warnY > 0 && warnY < H ? `<line x1="0" y1="${warnY}" x2="${W}" y2="${warnY}" stroke="#ff9800" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>` : ''}
          <polyline points="${pts}" fill="none" stroke="${barColor}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
          ${vals.map((v,i) => {
            const x = Math.round((i/(vals.length-1))*W);
            const y = Math.round(H - ((v-minV)/range)*(H-6) - 3);
            return i === vals.length-1 ? `<circle cx="${x}" cy="${y}" r="4" fill="${barColor}"/>` : '';
          }).join('')}
        </svg>
        <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-top:2px">
          <span>12h 前</span><span>現在</span>
        </div>
      </div>
    </div>`;

  // Fly to station
  map.flyTo([st.lat, st.lng], 14, { duration: 1 });
}
window.showStationDetail = showStationDetail;
window.State = State;

// ═══════════════════════════════════════════
// Water data refresh loop (F-05)
// ═══════════════════════════════════════════
async function refreshWater() {
  try {
    State.waterData = await fetchWaterData();
    renderStationMarkers(State.waterData);
    if (State.activeTab === 'water') renderWaterPanel();
    // Update sidebar badges
    updateRiverBadges();
  } catch(e) {
    console.warn('Water data fetch failed:', e);
  }
}

function updateRiverBadges() {
  RIVERS.forEach(river => {
    const myStations = STATIONS.filter(s => s.river === river.id);
    const alertCount = myStations.filter(s => State.waterData[s.id]?.status === 'alert').length;
    const warnCount  = myStations.filter(s => State.waterData[s.id]?.status === 'warn').length;
    const item = State.riverItems[river.id];
    if (!item) return;
    let badge = item.querySelector('.river-badge');
    if (!badge) { badge = document.createElement('span'); badge.className = 'river-badge'; item.querySelector('div').appendChild(badge); }
    if (alertCount > 0)     { badge.textContent = '⚠'; badge.style.color = '#f44336'; }
    else if (warnCount > 0) { badge.textContent = '!'; badge.style.color = '#ff9800'; }
    else                    { badge.textContent = ''; }
  });
}

// ═══════════════════════════════════════════
// Map controls
// ═══════════════════════════════════════════
function toggleRiver(id, itemEl) {
  if (State.visibleRivers.has(id)) {
    State.visibleRivers.delete(id);
    map.removeLayer(State.layers[id]);
    // Hide POIs of this river
    State.poiLayers.filter(p => p.poi.river === id).forEach(p => map.removeLayer(p.marker));
    itemEl.classList.remove('visible');
    if (State.selectedRiver === id) {
      State.selectedRiver = null;
      document.getElementById('river-detail').style.display = 'none';
      document.getElementById('info-placeholder').style.display = 'block';
    }
  } else {
    State.visibleRivers.add(id);
    State.layers[id].addTo(map);
    State.poiLayers.filter(p => p.poi.river === id).forEach(p => p.marker.addTo(map));
    itemEl.classList.add('visible');
  }
}

function flyToRiver(id) {
  const bounds = State.layers[id]?.getBounds();
  if (bounds) map.flyToBounds(bounds, { padding:[40,40], duration:1.2 });
}
window.flyToRiver = flyToRiver;
window.map = map;

// ═══════════════════════════════════════════
// Init
// ═══════════════════════════════════════════
window.addEventListener('load', async () => {
  // Hide loading
  setTimeout(() => {
    const loading = document.getElementById('loading');
    loading.style.opacity = '0';
    setTimeout(() => loading.style.display = 'none', 500);
  }, 1500);

  // Initial water data
  await refreshWater();

  // Refresh every 60 seconds
  State.waterRefreshInterval = setInterval(refreshWater, 60000);
});

</script>
</body>
</html>
